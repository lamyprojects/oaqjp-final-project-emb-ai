<html>
<head>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <!-- VAŽNO: bez ./ -->
    <script src="static/mywebscript.js"></script>

    <style>
        .center-heading {
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="card-body">

            <h1 class="center-heading">NLP - Emotion Detection</h1>

            <div style="padding:25px;">
                <h2 class="mb-3">
                    <label>Please enter the text to be analyzed</label>
                </h2>

                <!-- Ispravan input -->
                <textarea class="form-control"
                          id="textToAnalyze"
                          rows="3"></textarea>
            </div>

            <div style="padding:25px;">
                <button onclick="RunSentimentAnalysis()"
                        class="btn btn-secondary">
                    Run Sentiment Analysis
                </button>
            </div>

            <div style="padding:25px;">
                <h2 class="mb-3">
                    <label>Result of Emotion Detection</label>
                </h2>

                <div id="system_response"></div>
            </div>

        </div>
    </div>
</body>
</html>
